name: Deploy UN Monitor V2

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Update live job data
        shell: bash
        run: |
          if ! python work/export_live_jobs.py; then
            echo "::warning::Live job refresh failed. Deploying the last committed jobs-data.js instead."
          fi

      - name: Commit refreshed job data
        if: github.event_name != 'push'
        shell: bash
        run: |
          if git diff --quiet -- outputs/unmonitor-v2/jobs-data.js; then
            echo "No job data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/unmonitor-v2/jobs-data.js
          git commit -m "Update job data [skip ci]"
          git push

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: outputs/unmonitor-v2

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
